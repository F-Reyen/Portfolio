<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Formulaire</title>
  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="overlay"></div>

  <div class="form-container">
    <h1 class="form-title">CONTACT</h1>

    <form>
      <div class="row">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" placeholder="Votre prénom">
        </div>

        <div class="form-group">
          <label>Nom</label>
          <input type="text" placeholder="Votre nom">
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="exemple@mail.com">
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea placeholder="Votre message..."></textarea>
      </div>

      <button type="submit">ENVOYER</button>
    </form>
  </div>

</body>
</html>
